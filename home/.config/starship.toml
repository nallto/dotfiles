"$schema" = 'https://starship.rs/config-schema.json'

scan_timeout = 100
command_timeout = 500
add_newline = true
follow_symlinks = false

format = """
[¯éÂ](fg:seg_user)[  ](fg:col_black bg:seg_user)\
$username\
[¯é░](fg:seg_user bg:seg_dir)\
$directory\
$git_branch\
${custom.git_worktree}\
$git_status\
$git_metrics\
[¯é░](fg:prev_bg bg:none)\
$fill\
$c\
$dart\
$golang\
$java\
$kotlin\
$nodejs\
$php\
$python\
$rust\
$swift\
$container\
$docker_context\
$aws\
$gcloud\
$line_break\
$character\
"""

right_format = """
$cmd_duration\
$time
"""

palette = "custom"

[palettes.custom]
seg_user = "#EA76A0"
seg_dir = "#7FB5FF"
seg_git = "#1A1C20"

col_black = "#0A0A0A"
col_blue = "#7FB5FF"
col_cyan = "#56C6D5"
col_cyan_gray = "#95C9D0"
col_white = "#E0E0E0"
col_green = "#7EC49D"
col_yellow = "#E1C155"
col_red = "#F797A3"
col_gray = "#838B9B"
col_purple = "#BCA2FF"

[username]
format = '[$user ](fg:col_black bg:seg_user)'
disabled = false
show_always = false

[directory]
format = "[ $path ](fg:col_black bg:seg_dir)"
truncation_length = 0
truncate_to_repo = true
read_only = " ¾░î¥"

[git_branch]
format = "[¯é░](fg:seg_dir bg:seg_git)[  ´Éİ $branch(:$remote_branch) ](fg:col_white bg:seg_git)"

[custom.git_worktree]
description = "Show indicator when inside a git worktree"
command = """
if git rev-parse --git-dir >/dev/null 2>&1; then
      common_dir=$(git rev-parse --path-format=absolute --git-common-dir 2>/dev/null)
      git_dir=$(git rev-parse --path-format=absolute --git-dir 2>/dev/null)
      if [ "$common_dir" != "$git_dir" ]; then
            echo "Ôøô "
      fi
fi
"""
when = "git rev-parse --is-inside-work-tree >/dev/null 2>&1"
format = "([$output ](fg:col_cyan bg:seg_git))"
require_repo = true
ignore_timeout = true

[git_status]
format = "[ ($stashed$untracked$modified$renamed$deleted$conflicted$staged )($ahead_behind )](fg:col_white bg:seg_git)"
stashed = "[´öŞ  ](fg:col_gray bg:seg_git)"
untracked = "[´æù ${count} ](fg:col_green bg:seg_git)"
modified = "[´æÖ ${count} ](fg:col_yellow bg:seg_git)"
renamed = "[´æÜ ${count} ](fg:col_yellow bg:seg_git)"
deleted = "[´æİ ${count} ](fg:col_red bg:seg_git)"
conflicted = "[´Éí ](fg:col_red bg:seg_git)"
staged = "[´æı ](fg:col_green bg:seg_git)"
up_to_date = "[](fg:col_blue bg:seg_git)"
ahead = "[Ôçí${count} ](fg:col_green bg:seg_git)"
behind = "[Ôçú${count} ](fg:col_red bg:seg_git)"
diverged = "[ÔçòÔçí${ahead_count} Ôçú${behind_count}](fg:col_purple bg:seg_git)"

[git_metrics]
format = "([+$added ](fg:col_green bg:seg_git))([-$deleted ](fg:col_red bg:seg_git))"
disabled = true

[fill]
symbol = ' '
style = 'fg:none bg:none'

[character]
success_symbol = "[ÔØ»](bold col_green)"
error_symbol = "[ÔØ»](bold col_red)"

[c]
symbol = "¯İŞ "
format = "[ $symbol $name $version ]($style)"

[dart]
symbol = "¯Şİ "
format = "[ $symbol $version ]($style)"

[golang]
symbol = "¯£ñ "
format = "[ $symbol ($version )($mod_version ) ]($style)"

[java]
symbol = "¯£© "
format = "[ $symbol $version ]($style)"

[kotlin]
symbol = "¯áø "
format = "[ $symbol $version ]($style)"

[nodejs]
symbol = "¯£İ "
format = "[ $symbol $version ]($style)"

[php]
symbol = "¯£¢ "
format = "[ $symbol $version ]($style)"

[python]
symbol = "¯£╝ "
format = "[ $symbol $version ]($style)"

[rust]
symbol = "¯Ş¿ "
format = "[ $symbol $version ]($style)"

[swift]
symbol = "¯Øò "
format = "[ $symbol $version ]($style)"

[container]
format = '[$symbol \[$name\] ]($style) '

[docker_context]
symbol = "¯Ş░ "
format = "[ $symbol $context ]($style)"

[aws]
symbol = "¯Ş¡ "
format = "[ $symbol $profile ]($style)"
disabled = false

[gcloud]
symbol = "¯ş▒ "
format = "[ $symbol $account($project) ]($style)"
disabled = false

[cmd_duration]
min_time = 500
show_milliseconds = true
format = "[ $duration](col_yellow)[ ¯é╗ ](col_gray)"

[time]
time_format = '%T'
format = "[$time](col_gray)"
disabled = false
